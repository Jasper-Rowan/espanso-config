# espanso match file

# For a complete introduction, visit the official docs at: https://espanso.org/docs/

# You can use this file to define the base matches (aka snippets)
# that will be available in every application when using espanso.

# Matches are substitution rules: when you type the "trigger" string
# it gets replaced by the "replace" string.

# yaml-language-server: $schema=https://raw.githubusercontent.com/espanso/espanso/dev/schemas/match.schema.json

matches:
  # Simple text replacement
  - trigger: ":espanso"
    replace: "Hi there!"

  # NOTE: espanso uses YAML to define matches, so pay attention to the indentation!

  # But matches can also be dynamic:

  # Print the current date
  - trigger: ":date"
    replace: "{{mydate}}"
    vars:
      - name: mydate
        type: date
        params:
          format: "%m/%d/%Y"

  # Print the output of a shell command
  - trigger: ":shell"
    replace: "{{output}}"
    vars:
      - name: output
        type: shell
        params:
          cmd: "echo 'Hello from your shell'"

  # And much more! For more information, visit the docs: https://espanso.org/docs/

  # AI Prompts (content loaded from prompts/ directory)
  
  # Call transcript analysis prompt
  - trigger: ';t'
    replace: '{{transcript_prompt}}'
    vars:
      - name: transcript_prompt
        type: shell
        params:
          cmd: 'cat "$CONFIG/prompts/transcript-analysis.txt"'
  
  # Discovery call follow-up email prompt
  - trigger: ';e'
    replace: '{{email_prompt}}'
    vars:
      - name: email_prompt
        type: shell
        params:
          cmd: 'cat "$CONFIG/prompts/followup-email.txt"'
  
  # Quick snippets and links
  
  # Discovery pre-work request
  - trigger: ';d'
    replace: 'Hey team,\n\n\nAhead of our upcoming discovery session, please complete the short pre-work in the attached Google Sheet.\n\n\nThe goal is to quickly identify and quantify your highest-value automation opportunities so we can use our time together to prioritize the single best use case to pilot first.\n\n\n\n\nPlease list 3 to 8 candidate use cases and fill in the requested fields. The ROI will calculate automatically.\nThis should take about 10 minutes.\n\n\n\nLet me know if you have any questions, and I look forward to reviewing this together on our call.\n\n\n\n\nBest,\nJasper'
  
  # Video descriptions
  - trigger: ';v'
    replace: |
      Creating and Editing Files in a Word Add-in: This shows how you can open our entire software inside of Microsoft Word and use it to create and edit document files with all the benefits of the rest of our software and all the benefits of working natively in Word.
      https://pub-5012341e41544dc2bc93f0fad19ee3ac.r2.dev/videos/word-addin.mp4

      One-Shotting a Compliance Matrix (Requirement Traceability Matrix): This video shows how you can do a single shot of a compliance matrix. This particular type of compliance matrix is sometimes called a Requirements Traceability Matrix. It's basically all of the specific line items that you need to respond to within a given RFP. Our software has the capability to essentially do this in about a minute and a half to two minutes. Usually this was a process that would take upwards of 40 hours for a human to do manually, pre-AI.
      https://pub-5012341e41544dc2bc93f0fad19ee3ac.r2.dev/videos/one-shotting-compliance-matrix.mp4

      One-Shotting a Stylized PowerPoint: This shows how you can create a stylized PowerPoint. What's not shown in this is you can actually upload your own images or any sort of style guide references. I just need to extend this video. I realized that I didn't include that capability, but you could upload your own logos and it would be able to basically embed those within your PowerPoints as well. However, that is not shown in this video.
      https://pub-5012341e41544dc2bc93f0fad19ee3ac.r2.dev/videos/single-shot-powerpoint.mp4

      How to Upload and Filter Files at Scale: This shows how you can take a super messy database full of a bunch of files that are not beneficial to include and allows users to easily follow the principle of garbage in, garbage out for AI knowledge bases. Our Upload Pipeline lets you very quickly take unstructured data and organize it using just a simple text prompt.
      https://pub-5012341e41544dc2bc93f0fad19ee3ac.r2.dev/videos/upload-files-at-scale.mp4

      Interactive Widgets and Agents in Chat: This video demonstrates how you can create interactive widgets and applications directly inside the chat interface. See examples of customizable quizzes, educational tools, and dynamic content that agents can render in real-time, all tailored to any use case you need.
      https://www.loom.com/share/bffc5d82f9634cd486459341212f25ee
  
  # Meeting link with context text (email-friendly)
  - trigger: ';m'
    replace: 'Let me know if you have some times that work for you or feel free to use my calendar link to schedule a time: https://meetings-na2.hubspot.com/jasper-rowan/jaspers-personal-meeting-link'
  
  # Cypress AI 1-pager with context
  - trigger: ';1'
    replace: 'Here''s our 1-pager and case studies: https://na2.hubs.ly/H01CMPt0'
  
  # Pricing sheet with context
  - trigger: ';p'
    replace: 'Here''s our pricing sheet: https://na2.hubs.ly/H01L6190'

